<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
    }
    #bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    #mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.3);
    }
    #selection {
      position: absolute;
      border: 2px dashed #82aaff;
      background: transparent;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
      display: none;
      pointer-events: none;
    }
    #info {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 2px 6px;
      font-size: 12px;
      font-family: monospace;
      border-radius: 4px;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="mask"></div>
  <div id="selection"></div>
  <div id="info"></div>
  <script src="screenshot-overlay.js"></script>
</body>
</html>
