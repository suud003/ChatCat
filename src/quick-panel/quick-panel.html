<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.35); }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: transparent;
      overflow: hidden;
      padding: 10px;
      user-select: none;
    }
    
    .panel {
      width: 400px;
      min-height: 0;
      max-height: calc(100vh - 20px);
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 3px solid #222;
      border-radius: 22px;
      box-shadow: 3px 3px 0 #222;
      padding: 8px 14px 12px;
      overflow: hidden;
    }
    
    .panel-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #222;
      -webkit-app-region: drag;
      cursor: grab;
      line-height: 1;
      flex-shrink: 0;
    }

    .panel-title-icon {
      font-size: 16px;
    }

    .panel-title {
      letter-spacing: 0.2px;
    }

    .chat-ctrl-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #222;
      background: #fff;
      color: #222;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      -webkit-app-region: no-drag;
      margin-left: auto;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .chat-ctrl-btn:hover {
      background: #f5576c;
      color: #fff;
      border-color: #f5576c;
    }
    
    .input-area {
      -webkit-app-region: no-drag;
      background: #f8f8f8;
      border: 2px solid #222;
      border-radius: 16px;
      box-shadow: 2px 2px 0 #222;
      padding: 8px 12px;
      margin-bottom: 10px;
      min-height: 60px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 13px;
      outline: none;
      color: #222;
      flex-shrink: 0;
      user-select: text;
      cursor: text;
    }
    .input-area:empty::before {
      content: attr(data-placeholder);
      color: #aaa;
    }
    .input-area:focus {
      border-color: #0066cc;
    }

    .paste-image-preview {
      -webkit-app-region: no-drag;
      display: none;
      margin-bottom: 10px;
      padding: 8px;
      background: #f8f8fa;
      border: 1px solid #e8e8ec;
      border-radius: 10px;
      text-align: center;
      flex-shrink: 0;
    }
    .paste-image-preview.visible {
      display: block;
    }
    
    .mode-buttons {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .mode-btn {
      background: transparent;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #888;
      flex-shrink: 0;
    }
    .mode-btn:hover { color: #555; background: #f0f0f0; }
    .mode-btn.active {
      color: #222;
      background: #f0f0f0;
      border-color: #222;
    }
    
    .result-area {
      -webkit-app-region: no-drag;
      background: #fafafa;
      border: 2px solid #e6e6e6;
      border-radius: 12px;
      padding: 12px;
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
      display: none;
      user-select: text;
      max-height: 420px;
    }
    .result-area.visible {
      display: block;
      min-height: 150px;
    }
    .result-area .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #222;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    
    .actions {
      -webkit-app-region: no-drag;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ececec;
      flex-shrink: 0;
    }
    .actions-group {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .action-btn {
      background: #222;
      color: #fff;
      border: 2px solid #222;
      border-radius: 12px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }
    .action-btn:hover { transform: scale(1.04); }
    .action-btn.secondary {
      background: #fff;
      color: #555;
      border-color: #ccc;
      box-shadow: none;
    }
    .action-btn.secondary:hover { background: #f4f4f4; }
    
    .status-bar {
      font-size: 11px;
      color: #888;
      flex: 1 1 auto;
      min-width: 0;
      line-height: 1.4;
    }

    /* Cat icon sizing for Quick Panel */
    .cat-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      vertical-align: middle;
      object-fit: contain;
      margin-right: 2px;
      flex-shrink: 0;
    }
    .mode-btn .cat-icon {
      width: 18px;
      height: 18px;
      margin-right: 3px;
    }
    .action-btn .cat-icon {
      width: 14px;
      height: 14px;
      margin-right: 2px;
    }
    .panel-title-icon .cat-icon {
      width: 16px;
      height: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title-icon">⚡</span>
      <span class="panel-title">快捷AI助手</span>
      <button class="chat-ctrl-btn" id="btn-close" title="关闭">×</button>
    </div>
    
    <div class="input-area" contenteditable="true" id="input-area"
         data-placeholder="输入问题或粘贴文本/图片..."></div>
    <div id="paste-image-preview" class="paste-image-preview"></div>
    
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="ask"><img src="../icons/qp-ask.png" class="cat-icon" alt=""> 问答</button>
      <button class="mode-btn active" data-mode="polish"><img src="../icons/qp-polish.png" class="cat-icon" alt=""> 润色</button>
      <button class="mode-btn" data-mode="summarize"><img src="../icons/qp-summarize.png" class="cat-icon" alt=""> 总结</button>
      <button class="mode-btn" data-mode="explain"><img src="../icons/qp-explain.png" class="cat-icon" alt=""> 解释</button>
      <button class="mode-btn" data-mode="screenshot"><img src="../icons/qp-screenshot.png" class="cat-icon" alt=""> 识图</button>
    </div>
    
    <div class="result-area" id="result-area"></div>
    
    <div class="actions">
      <span class="status-bar" id="status-bar">ESC 关闭 · Ctrl+Enter 发送</span>
      <div class="actions-group">
        <button class="action-btn secondary" id="btn-history"><img src="../icons/tab-clipboard.png" class="cat-icon" alt=""> 历史</button>
        <button class="action-btn" id="btn-send">发送 ↵</button>
      </div>
    </div>
  </div>
  
  <script src="quick-panel-renderer.js" type="module"></script>
</body>
</html>
