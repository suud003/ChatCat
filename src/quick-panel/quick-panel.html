<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: transparent;
      overflow: hidden;
      height: 100vh;
    }
    
    .panel {
      width: 400px;
      max-height: calc(100vh - 20px);
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 16px;
      margin: 10px;
    }
    
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #6c4ab6;
      -webkit-app-region: drag;
      cursor: grab;
    }
    
    .input-area {
      -webkit-app-region: no-drag;
      background: #f8f8fa;
      border: 1px solid #e8e8ec;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      min-height: 60px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 13px;
      outline: none;
      color: #333;
      flex-shrink: 0;
    }
    .input-area:empty::before {
      content: attr(data-placeholder);
      color: #aaa;
    }
    
    .mode-buttons {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .mode-btn {
      background: #f5f5f7;
      border: 1px solid #e0e0e4;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
    }
    .mode-btn:hover { background: #eee; }
    .mode-btn.active {
      background: #6c4ab6;
      color: #fff;
      border-color: #6c4ab6;
    }
    
    .result-area {
      -webkit-app-region: no-drag;
      background: linear-gradient(135deg, #f3f0ff 0%, #faf8ff 100%);
      border: 1.5px solid #d8d0f0;
      border-radius: 10px;
      padding: 12px;
      min-height: 60px;
      flex: 1 1 auto;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #444;
      display: none;
      position: relative;
    }
    .result-area::before {
      content: '🐱 AI 回复';
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6c4ab6;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px dashed #d8d0f0;
    }
    .result-area.visible { display: block; }
    .result-area .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #6c4ab6;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    
    .actions {
      -webkit-app-region: no-drag;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      flex-shrink: 0;
    }
    .action-btn {
      background: #6c4ab6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .action-btn:hover { background: #5a3d9e; }
    .action-btn.secondary {
      background: #f0f0f3;
      color: #666;
    }
    .action-btn.secondary:hover { background: #e5e5e8; }
    
    .status-bar {
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <span>🐱</span> ChatCat Quick Panel
      <span style="margin-left:auto;font-size:11px;color:#aaa;-webkit-app-region:no-drag;cursor:pointer;" id="btn-close">✕</span>
    </div>
    
    <div class="input-area" contenteditable="true" id="input-area"
         data-placeholder="输入问题或粘贴文本/图片..."></div>
    <div id="paste-image-preview" style="display:none;margin-bottom:10px;padding:8px;background:#f8f8fa;border:1px solid #e8e8ec;border-radius:10px;text-align:center;"></div>
    
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="ask">💬 问答</button>
      <button class="mode-btn active" data-mode="polish">✏️ 润色</button>
      <button class="mode-btn" data-mode="summarize">📋 总结</button>
      <button class="mode-btn" data-mode="explain">🔍 解释</button>
      <button class="mode-btn" data-mode="screenshot">📸 识图</button>
    </div>
    
    <div class="result-area" id="result-area"></div>
    
    <div class="actions">
      <span class="status-bar" id="status-bar">ESC 关闭 · Ctrl+Enter 发送</span>
      <div>
        <button class="action-btn secondary" id="btn-history">📋 历史</button>
        <button class="action-btn" id="btn-send">发送 ↵</button>
      </div>
    </div>
  </div>
  
  <script src="quick-panel-renderer.js" type="module"></script>
</body>
</html>
