<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ChatCat - 技能/MCP 管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }

    /* Title bar */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 16px;
      background: #16213e;
      -webkit-app-region: drag;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #ffb74d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .titlebar-close {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .titlebar-close:hover {
      background: rgba(255,100,100,0.2);
      color: #ff6b6b;
    }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 12px 16px 0;
      gap: 4px;
    }
    .tab {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.15s;
    }
    .tab:hover { color: #bbb; background: rgba(255,255,255,0.04); }
    .tab.active {
      color: #ffb74d;
      background: #0f3460;
    }

    /* Content area */
    .content {
      padding: 16px;
      height: calc(100vh - 40px - 44px - 36px);
      overflow: hidden;
    }
    .tab-panel { display: none; height: 100%; }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* Action bar */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn-import {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-import-skill {
      background: rgba(255,126,103,0.1);
      border-color: rgba(255,126,103,0.4);
      color: #ff7e67;
    }
    .btn-import-skill:hover {
      background: rgba(255,126,103,0.2);
      border-color: #ff7e67;
    }
    .btn-import-mcp {
      background: rgba(100,180,255,0.1);
      border-color: rgba(100,180,255,0.4);
      color: #64b4ff;
    }
    .btn-import-mcp:hover {
      background: rgba(100,180,255,0.2);
      border-color: #64b4ff;
    }

    /* List */
    .list-container {
      flex: 1;
      overflow-y: auto;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .list-container::-webkit-scrollbar { width: 0; display: none; }

    .list-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 13px;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .list-item:hover { background: rgba(255,255,255,0.03); }
    .list-item:last-child { border-bottom: none; }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .item-name .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-builtin { background: rgba(255,183,77,0.15); color: #ffb74d; }
    .badge-imported { background: rgba(100,180,255,0.15); color: #64b4ff; }
    .item-desc {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 12px;
      flex-shrink: 0;
    }
    .btn-delete {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid rgba(255,107,107,0.3);
      background: rgba(255,107,107,0.08);
      color: #ff6b6b;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover {
      background: rgba(255,107,107,0.2);
      border-color: #ff6b6b;
    }

    /* Status bar */
    .statusbar {
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 11px;
      color: #666;
      background: #16213e;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-success { background: rgba(76,175,80,0.9); color: #fff; }
    .toast-error { background: rgba(244,67,54,0.9); color: #fff; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">
      <span>🐱</span>
      <span>技能 / MCP 管理</span>
    </div>
    <button class="titlebar-close" id="btn-close">&times;</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="skills">技能管理</button>
    <button class="tab" data-tab="mcp">MCP 配置</button>
  </div>

  <div class="content">
    <!-- Skills Tab -->
    <div class="tab-panel active" id="panel-skills">
      <div class="action-bar">
        <button class="btn-import btn-import-skill" id="btn-import-skill">
          <span>+</span> 导入技能 (.zip)
        </button>
      </div>
      <div class="list-container" id="skills-list">
        <div class="list-empty">加载中...</div>
      </div>
    </div>

    <!-- MCP Tab -->
    <div class="tab-panel" id="panel-mcp">
      <div class="action-bar">
        <button class="btn-import btn-import-mcp" id="btn-import-mcp">
          <span>+</span> 导入 MCP 配置 (.json)
        </button>
      </div>
      <div class="list-container" id="mcp-list">
        <div class="list-empty">加载中...</div>
      </div>
    </div>
  </div>

  <div class="statusbar" id="statusbar">就绪</div>

  <div class="toast" id="toast"></div>

  <script src="./skills-manager-renderer.js"></script>
</body>
</html>
