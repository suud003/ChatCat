  卡片网格(2列): <div class="card-grid card-grid--2"><div class="card"><h4>标题</h4><p>内容</p></div></div>
  卡片网格(4列): <div class="card-grid card-grid--4"><div class="card"><h4>标题</h4><p>内容</p></div></div>
  对比网格:      <div class="compare-grid"><div class="card" style="border-top:4px solid var(--green)"><h4>A</h4><p>说明</p></div><div class="card" style="border-top:4px solid var(--blue)"><h4>B</h4><p>说明</p></div></div>
  子章节:        <div class="subsection"><h3>子标题</h3>...</div>

  ── 数据组件 ──
  表格:          <div class="table-wrap"><table><thead><tr><th>列</th></tr></thead><tbody><tr><td>值</td></tr></tbody></table></div>
  KPI 卡片:      <div class="kpi-row"><div class="kpi-card" style="border-top:3px solid var(--accent)"><div class="kpi-num" style="color:var(--accent)">42</div><div class="kpi-label">Metric</div><div class="kpi-desc">描述</div></div></div>
  柱状图:        <div class="bar-chart"><div class="bar-item"><div class="bar-value">80%</div><div class="bar-fill" style="height:80%;background:var(--accent)"></div><div class="bar-label">A</div></div></div>

  ── 流程组件 ──
  流程图(CSS):   <div class="flow"><div class="flow-node fn--accent"><div class="fn-name">节点</div><div class="fn-sub">描述</div></div><span class="flow-arrow">&rarr;</span></div>
  洞察卡片:      <div class="insight-item"><h4><span class="badge badge--accent">1</span> 标题</h4><p>内容</p></div>

  ── SVG 图表 ──
  流水线SVG:     <div class="pipeline-wrap"><svg viewBox="0 0 880 260">...节点+箭头marker+虚线路径...</svg></div>
  架构SVG:       <div class="arch-diagram"><svg viewBox="0 0 900 300">...分组框+节点+连线...</svg></div>

  折叠面板:      <details><summary>标题</summary><div class="detail-body"><p>内容</p></div></details>
  参考卡片:      <details class="ref-card"><summary>参考标题</summary><div class="ref-body"><div class="ref-item"><span class="ref-item-label">标签</span><img src="..." onclick="openImgOverlay(this.src)"/></div></div></details>

  提示框(7色):   <div class="callout callout--accent"><strong>标题</strong> 内容</div>
